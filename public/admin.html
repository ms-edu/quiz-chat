<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin - QuizChat</title>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; background: #f4f7f6; }
        .sidebar { width: 220px; background: #075E54; color: white; height: 100vh; padding: 20px; }
        .sidebar button { width: 100%; padding: 12px; margin-bottom: 10px; cursor: pointer; border: none; border-radius: 5px; text-align: left; }
        .main { flex: 1; padding: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #ddd; padding: 12px; text-align: left; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; }
        .modal-content { background:white; padding:25px; border-radius:10px; width:400px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Quiz Admin</h2>
        <button onclick="showPage('page-students')">Data Siswa</button>
        <button onclick="showPage('page-quizzes')">Manajemen Kuis</button>
    </div>

    <div class="main">
        <div id="page-students" class="page">
            <div style="display:flex; justify-content:space-between">
                <h3>Daftar Siswa</h3>
                <button onclick="openModal('modal-student')" style="background:#25D366; color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer">+ Tambah Siswa</button>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th>NIS</th><th>Nama Lengkap</th><th>Kelas</th><th>Aksi</th></tr></thead>
                    <tbody id="student-list"></tbody>
                </table>
            </div>
        </div>

        <div id="page-quizzes" class="page" style="display:none">
            <h3>Buat Kuis Baru</h3>
            <div class="card">
                <label>Judul Kuis</label>
                <input type="text" id="q-title" placeholder="Contoh: Ulangan Harian IPA">
                <label>Untuk Jenjang Kelas (Hanya Angka)</label>
                <input type="number" id="q-level" placeholder="Contoh: 5">
                <p style="font-size:12px; color:gray">* Jika diisi 5, maka kelas 5A, 5B, 5C dst bisa mengerjakan.</p>
                <button style="background:#075E54; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer">Simpan Kuis</button>
            </div>
        </div>
    </div>

    <div id="modal-student" class="modal">
        <div class="modal-content">
            <h4>Tambah Siswa Baru</h4>
            <input type="text" id="std-nis" placeholder="NIS (Contoh: 2024001)">
            <input type="text" id="std-name" placeholder="Nama Lengkap">
            <input type="text" id="std-class" placeholder="Kelas (Contoh: 5A)">
            <button onclick="saveStudent()" style="background:#075E54; color:white; width:100%; border:none; padding:10px; margin-top:10px; border-radius:5px; cursor:pointer">Simpan Data</button>
            <button onclick="closeModal('modal-student')" style="background:#ccc; width:100%; border:none; padding:10px; margin-top:5px; border-radius:5px; cursor:pointer">Batal</button>
        </div>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            if(id === 'page-students') loadStudents();
        }

        async function loadStudents() {
            const res = await fetch('/api/students');
            const data = await res.json();
            document.getElementById('student-list').innerHTML = data.map(s => `
                <tr>
                    <td><b>${s.nis}</b></td>
                    <td>${s.name}</td>
                    <td>${s.class_name}</td>
                    <td><button onclick="deleteStudent('${s.nis}')" style="color:red; border:none; background:none; cursor:pointer">Hapus</button></td>
                </tr>
            `).join('');
        }

        async function saveStudent() {
            const body = {
                nis: document.getElementById('std-nis').value,
                name: document.getElementById('std-name').value,
                class_name: document.getElementById('std-class').value
            };
            await fetch('/api/students', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
            closeModal('modal-student');
            loadStudents();
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        loadStudents();
    </script>
</body>
</html>
