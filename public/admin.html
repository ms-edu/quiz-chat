<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; background: #f4f7f6; }
        .sidebar { width: 240px; background: #075E54; color: white; height: 100vh; padding: 20px; box-sizing: border-box; }
        .sidebar h2 { font-size: 1.2rem; border-bottom: 1px solid #128C7E; padding-bottom: 10px; }
        .sidebar button { width: 100%; padding: 12px; margin: 5px 0; border: none; background: none; color: white; text-align: left; cursor: pointer; border-radius: 5px; }
        .sidebar button:hover { background: #128C7E; }
        .main { flex: 1; padding: 30px; box-sizing: border-box; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { padding: 10px; margin-right: 10px; border: 1px solid #ddd; border-radius: 5px; width: 180px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .btn-add { background: #25D366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>QuizChat Admin</h2>
        <button onclick="showPage('page-students')">Data Siswa</button>
        <button onclick="showPage('page-quizzes')">Manajemen Kuis</button>
    </div>

    <div class="main">
        <div id="page-students">
            <h3>Daftar Siswa</h3>
            <div class="card">
                <h4>Tambah Siswa Baru</h4>
                <input type="text" id="std-nis" placeholder="NIS">
                <input type="text" id="std-name" placeholder="Nama Lengkap">
                <input type="text" id="std-class" placeholder="Kelas (Misal: 5A)">
                <button class="btn-add" onclick="saveStudent()">Simpan Siswa</button>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th>NIS</th><th>Nama Lengkap</th><th>Kelas</th><th>Aksi</th></tr></thead>
                    <tbody id="student-list"></tbody>
                </table>
            </div>
        </div>

        <div id="page-quizzes" style="display:none">
            <h3>Buat Kuis</h3>
            <div class="card">
                <input type="text" id="q-title" placeholder="Judul Kuis" style="width:100%; margin-bottom:10px;">
                <input type="number" id="q-level" placeholder="Untuk Tingkat Kelas (Contoh: 5)" style="width:100%;">
                <p style="font-size:12px; color:gray">Jika diisi 5, maka siswa kelas 5A, 5B, 5C, dll bisa mengerjakan.</p>
                <button class="btn-add">Simpan Kuis</button>
            </div>
        </div>
    </div>

    <script>
        async function loadStudents() {
            const res = await fetch('/api/students');
            const data = await res.json();
            document.getElementById('student-list').innerHTML = data.map(s => `
                <tr>
                    <td><b>${s.nis}</b></td>
                    <td>${s.name}</td>
                    <td>${s.class_name}</td>
                    <td><button onclick="deleteStudent('${s.nis}')" style="color:red; background:none; border:none; cursor:pointer">Hapus</button></td>
                </tr>
            `).join('');
        }

        async function saveStudent() {
            const body = {
                nis: document.getElementById('std-nis').value,
                name: document.getElementById('std-name').value,
                class_name: document.getElementById('std-class').value
            };
            if(!body.nis || !body.name || !body.class_name) return alert('Lengkapi data!');
            await fetch('/api/students', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
            loadStudents();
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        async function deleteStudent(nis) {
            if(!confirm('Hapus siswa ini?')) return;
            await fetch(`/api/students/${nis}`, { method: 'DELETE' });
            loadStudents();
        }

        function showPage(id) {
            document.getElementById('page-students').style.display = id === 'page-students' ? 'block' : 'none';
            document.getElementById('page-quizzes').style.display = id === 'page-quizzes' ? 'block' : 'none';
        }

        loadStudents();
    </script>
</body>
</html>
